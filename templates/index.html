<!DOCTYPE html>
<html>
<head>
    <title>Alzheimer Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: rgba(0,0,0,0.3);
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        /* MAIN CARD */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            text-align: center;
        }

        input[type=file] {
            padding: 10px;
            margin: 15px 0;
        }

        button {
            padding: 12px 30px;
            background: #00c6ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        img {
            margin-top: 20px;
            width: 250px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h3> Alzheimer Detection</h3>
    <div>
        <a href="/">Home</a>
        <a href="/history">History</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <h2>Upload MRI Image</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            <p><b>Result:</b> {{ result }}</p>
            <p><b>Confidence:</b> {{ confidence }}%</p>
        </div>

        <img src="{{ image_path }}">
    {% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>User History</h2>

<table class="table table-bordered">
<tr>
<th>Image</th>
<th>Result</th>
<th>Confidence</th>
<th>Time</th>
</tr>

{% for h in history %}
<tr>
<td><img src="{{ h.image }}" width="100"></td>
<td>{{ h.result }}</td>
<td>{{ h.confidence }}%</td>
<td>{{ h.time }}</td>
</tr>
{% endfor %}

</table>

<a href="/" class="btn btn-primary">Back</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
</head>
<body style="text-align:center; margin-top:100px;">
<h2>Signup</h2>

<form method="POST">
<input name="username" required><br><br>
<input type="password" name="password" required><br><br>
<button>Signup</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</body>
</html>
